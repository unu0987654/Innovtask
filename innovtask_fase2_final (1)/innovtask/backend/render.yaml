# render.yaml — Plano de despliegue de INNOVTASK en Render.
#
# Define DOS cosas que Render crea solas:
#   1) Una base de datos PostgreSQL (los datos NO se borran entre despliegues).
#   2) El servicio web (la app Flask servida con gunicorn).
#
# Render conecta la base al servicio automaticamente con la variable
# DATABASE_URL, asi que no tienes que copiar nada a mano.

databases:
  - name: innovtask-db
    plan: free

services:
  - type: web
    name: innovtask
    runtime: python
    plan: free
    # El codigo del backend esta dentro de innovtask/backend
    rootDir: innovtask/backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      # Conecta automaticamente la base de datos de arriba
      - key: DATABASE_URL
        fromDatabase:
          name: innovtask-db
          property: connectionString
      # Clave de cifrado de nombres/correos. Estable entre despliegues.
      # Puedes cambiarla por otra que generes tu; debe ser una clave Fernet valida.
      - key: MASTER_KEY
        value: 4cV4M0NjXbok9mZaj9Yts1wDniM6Antpi-Waj0tuJVo=
      - key: PYTHON_VERSION
        value: "3.12"
